baseURL = "https://KalebHawkins.github.io/KryoLogs"
title = 'KryoLogs'
languageCode = 'en-us'
theme = "hugo-blog-awesome"

# Enable emojis globally
enableEmoji = true

# set markup.highlight.noClasses=false to enable code highlight
[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[menu]
  [[menu.main]] 
    # The page reference (pageRef) is useful for menu highlighting
    # When pageRef is set, setting `url` is optional; it will be used as a fallback if the page is not found.
    pageRef="/"
    name = 'Home'
    url = 'https://kalebhawkins.github.io/KryoLogs/'
    weight = 10
  [[menu.main]]
    pageRef="posts"
    name = 'Posts'
    url = 'https://kalebhawkins.github.io/KryoLogs/posts/'
    weight = 20
  [[menu.main]]
    pageRef="about"
    name = 'About'
    url = 'https://kalebhawkins.github.io/KryoLogs/about/'
    weight = 30

[params]
  sitename = "KryoLogs"
  defaultColor = "dark" # set default color mode: dark or light
  description = "A place of entropy."

[params.author]
  avatar = "avatar.png" # put the file in assets folder; also ensure that image has same height and width
  # Note: image is not rendered if the resource(avatar image) is not found. No error is displayed.
  intro = "💻 Welcome to KryoLogs 💻"
  name = "Kryotek"
  description = "A place of entropy."

[[params.socialIcons]]
name = "github"
url = "https://github.com/KalebHawkins"