baseURL = 'https://kalebhawkins.github.io/KryoLogs'
# baseURL = "http://127.0.0.1:1313"
languageCode = 'en-us'
title = 'KryoLogs'
theme = "LoveIt"
languageName = "English"

# enableGitInfo = true
enableEmoji = true

[author]
  name = "Kaleb Hawkins"
  email = "KalebHawkins@outlook.com"
  link = "https://github.com/KalebHawkins"

[menu]
  [[menu.main]]
    weight = 1
    identifier = "posts"
    pre = ""
    post = ""
    name = "Posts"
